    - name: 2. 执行 Spider 实时检测与下载
      run: |
        cd tool/
        if [ -f "$CONFIG_FILE" ] && grep -q -E "spider|sites" "$CONFIG_FILE"; then
          # 动态提取原作者最新的 jar 链接
          JAR_URL1=$(grep -oP '"spider"\s*:\s*"\K[^"]+' "$CONFIG_FILE" | cut -d';' -f1)
          
          # 固定基础域名，针对  ./  本地化赋路径，按需修改
          #BASE_DOMAIN="https://raw.githubusercontent.com/IY-CPU/IY/main/"
          # 分三种情况给 JAR_URL 赋值
          if [[ "$JAR_URL1" == http* ]]; then
            # 情况2：完整http链接 /  和 情况3：带;截断后的完整链接
            JAR_URL="$JAR_URL1"
          else
            # 情况1：./xxx.jar 相对路径，去除./拼接 已定义的基础域名
            FILE_NAME="${JAR_URL1#./}"
            JAR_URL="${BASE_DOMAIN}${FILE_NAME}"
          fi
 
          
          if [ -n "$JAR_URL" ] && [[ "$JAR_URL" == http* ]]; then
            echo "成功抓取到远程 JAR 地址: $JAR_URL"
            #curl -L "$JAR_URL" -o "$JAR_FILE"
            curl -L --connect-timeout 15 --max-time 120 --retry 3 --retry-delay 2 "$JAR_URL" -o "$JAR_FILE"
            echo "已成功将最新的 jar 下载并重命名为 $JAR_FILE"
          else
            echo "提示：未在配置中找到远程 JAR 链接。"
          fi
        else
          echo "【错误】解密出来的基础 JSON 结构不合法！"
          exit 1
        fi
 
    - name: 3. 运行内置 Python 逻辑：注入 sites 并生成最终的 "$JSON_FILE"
      working-directory: tool/
      shell: bash
      run: |
        # 安装依赖
        pip install dirtyjson
        
        # 使用 heredoc 嵌入 Python 代码
        python <<'EOF'      
        import json
        import os
        INPUT_JSON =  os.environ.get("CONFIG_FILE")
        OUTPUT_JSON = os.environ.get("JSON_FILE")
        
        # 你的 GitHub 仓库对应的 输出 cpu.jar 纯净链接（不带 MD5）
        # 【请注意】：请把下面两行的“你的GitHub用户名”和“你的仓库名”修改为你实际的名称
        GITHUB_USER = os.environ.get("GIT_USER")
        GITHUB_REPO = os.environ.get("GIT_CK")
        jar_filename = os.environ.get("JAR_FILE")   # 获取环境变量值
        BASE_PROXY = os.environ.get("PROXY")
        # 检查是否有空值
        if not GITHUB_USER or not GITHUB_REPO or not jar_filename or not BASE_PROXY:
            print("[-] 请设置完整的环境变量：GIT_USER, GIT_CK, JAR_FILE, PROXY")
            exit(1)        
        #本地仓库下载完成纯净JAR文件路径    
        BASE_JAR_URL = f"{BASE_PROXY}/{GITHUB_USER}/{GITHUB_REPO}/main/{jar_filename}"
  
        if not os.path.exists(INPUT_JSON):
            print(f"[-] 未找到源文件 {INPUT_JSON}")
            exit(1)

        # with open(INPUT_JSON, "r", encoding="utf-8") as f:
        #     config_data = json.load(f)

        import dirtyjson  # 确保已导入

        with open(INPUT_JSON, "r", encoding="utf-8") as f:
            config_data = dirtyjson.load(f)
        

        # A. 顺便把最顶层的顶级 spider 链接也改成你自己的 $JAR_FILE
        config_data["spider"] = BASE_JAR_URL
        print("[+] 已更新顶级 spider 链接")

        # B. 遍历 sites 列表，无 jar 或 jar 为空的站点自动注入
        sites_list = config_data.get("sites", [])
        if isinstance(sites_list, list):
            updated_count = 0
            skipped_count = 0
            
            for site in sites_list:
                if isinstance(site, dict):
                    site_name = site.get("name", "未知站点")
                    current_jar = site.get("jar")

                    # 如果已有有效的 jar 地址则跳过
                    if current_jar and isinstance(current_jar, str) and current_jar.strip():
                        skipped_count += 1
                        continue

                    # 没有 jar 或为空 → 注入你自己的纯净链接
                    site["jar"] = BASE_JAR_URL
                    updated_count += 1
                    # 所有站点jar字段处理完毕后，统一定义基础地址,按需修改拼接地址
                    #BASE_URL = f"https://gh-proxy.org/https://raw.githubusercontent.com/IY-CPU/IY/main/"
                    my_base_url = os.environ.get("BASE_URL") 
    
                    # 通用替换函数：将以 ./ 开头的字符串替换为 BASE_URL 拼接路径
                    def replace_dot_slash(val: str) -> str:
                        s = val.strip()
                        if s.startswith("./"):
                            return my_base_url + s.lstrip("./")
                        return val

                    # 遍历所有站点，对每一项所有字符串值统一替换 ./
                    for site in sites_list:
                        if isinstance(site, dict):
                            for k, v in site.items():
                                if isinstance(v, str):
                                    site[k] = replace_dot_slash(v)
            print(f"[+] Sites 注入完成：更新了 {updated_count} 个站点，跳过了 {skipped_count} 个已有 jar 的站点")

        # C. 统一写出为最终文件名 "$JSON_FILE"，按需修改输出文件名
        with open(OUTPUT_JSON, "w", encoding="utf-8") as f:
            json.dump(config_data, f, indent=2, ensure_ascii=False)
        print(f"[+] 最终配置文件已成功生成: {OUTPUT_JSON}")
 
    
    - name: 4. 强行提交最新的 cpu.json 和 cpu.jar 到仓库，按需修改输出文件名
      run: |
        cd tool/
        # 移动文件到根目录（如果存在）
        if [ -f "$JSON_FILE" ]; then mv -f "$JSON_FILE" ../; fi
        if [ -f "$JAR_FILE" ]; then mv -f "$JAR_FILE" ../; fi
        cd $GITHUB_WORKSPACE        # 确保在根目录
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 强行添加，确保绕过任何 .gitignore 规则
        if [ -f "$JSON_FILE" ]; then git add -f "$JSON_FILE"; fi
        if [ -f "$JAR_FILE" ]; then git add -f "$JAR_FILE"; fi
        
        # 只要代码、配置或 jar 包有任何风吹草动，Git 都会自动捕捉并更新
        if ! git diff --cached --quiet; then
          git commit -m "自动同步最新$JSON_FILE与$JAR_FILE: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD
          echo "【成功】$JSON_FILE 和 $JAR_FILE 已成功推送到你的远程仓库！"
        else
          echo "【提示】内容与上一版本完全一致，无需重复提交。"
        fi

