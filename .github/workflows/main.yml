name: 自动解密与Spider下载

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午8点自动运行一次，你可以根据需要调整
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 1. 执行原有的解密脚本
      run: |
        # 这里换成你原先成功运行的解密脚本名字，比如 decrypt.py
        python decrypt.py 

    - name: 2. 执行新增的 Spider 实时检测与下载
      run: |
        python download_spider.py

    - name: 3. 将更新提交并推送到 GitHub 仓库
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # 把 json 和新下载的 aowu.png 都加进暂存区
        git add tvbox_config.json aowu.png
        
        # 检查是否有文件发生变化，有变化才提交，防止 workflow 报错
        if ! git diff --cached --quiet; then
          git commit -m "自动更新：解密配置与最新 aowu.png"
          git push
        else
          echo "数据未发生变化，无需提交。"
        fi
